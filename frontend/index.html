<head>

<title>🎮 GameNav - 游戏平台导航</title>
<script src="https://cdn.tailwindcss.com"></script>

<body class="text-white font-sans">
<header class="glass border-b border-white/10 sticky top-0 z-50">
<div class="w-full px-4 py-4 max-w-[1800px] mx-auto">
<div class="flex items-center justify-between gap-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-500 to-emerald-500 flex items-center justify-center text-xl float-animation">🎮</div>
<div><h1 class="text-2xl font-bold gradient-text" id="siteTitle">GameNav</h1></div>
<span class="hidden sm:inline text-gray-400 text-sm ml-2" id="siteSubtitle">游戏平台导航</span>
</div>
<div class="flex-1 max-w-xl">
<div class="relative">
<input type="text" id="searchInput" placeholder="搜索游戏平台、分类、标签..." class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-3 pl-12 text-white placeholder-gray-500 focus:outline-none search-glow transition-all">
<i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
</div>
</div>
<div class="flex items-center gap-4">
<div class="lang-dropdown">
<button class="flex items-center gap-2 px-3 py-2 bg-white/5 rounded-xl hover:bg-white/10 transition-all">
<i class="fas fa-globe"></i>
<span id="currentLang" class="text-sm">中文</span>
<i class="fas fa-chevron-down text-xs"></i>
</button>
<div class="lang-dropdown-content">
<div class="lang-option active" data-lang="zh"><span>🇨🇳</span><span>中文</span></div>
<div class="lang-option" data-lang="en"><span>🇺🇸</span><span>English</span></div>
<div class="lang-option" data-lang="ja"><span>🇯🇵</span><span>日本語</span></div>
<div class="lang-option" data-lang="ko"><span>🇰🇷</span><span>한국어</span></div>
<div class="lang-option" data-lang="tw"><span>🇹🇼</span><span>繁體中文</span></div>
</div>
</div>
<div id="statsCount" class="text-gray-400 text-sm hidden sm:block"></div>
</div>
</div>
</header>

<section class="hero-section py-12 px-4">
<div class="w-full text-center max-w-[1800px] mx-auto">
<h2 class="text-4xl md:text-5xl font-bold mb-4"><span id="heroTitle1">发现全球</span><span class="gradient-text" id="heroTitle2">游戏平台</span></h2>
<p class="text-gray-400 text-lg max-w-2xl mx-auto"><span id="heroDesc1">收录</span> <span class="text-cyan-400 font-bold" id="heroCount">30</span> <span id="heroDesc2">优质游戏平台，包括客户端、手游、页游、模拟器、媒体、社区等</span></p>
</div>
</section>

<main class="w-full px-4 pb-12 max-w-[1800px] mx-auto">
<div class="glass rounded-2xl p-4 mb-6 overflow-x-auto scrollbar-hide">
<div class="flex flex-wrap gap-2" id="categoryFilters">
<button class="category-btn active px-5 py-2 rounded-xl bg-white/5 text-sm font-medium transition-all whitespace-nowrap" data-category="" id="catAll">全部平台</button>
</div>
</div>

<div class="flex flex-wrap items-center gap-3 mb-8 w-full">
<div class="flex items-center gap-2"><i class="fas fa-globe text-gray-500"></i><span class="text-gray-400 text-sm" id="regionLabel">地区:</span></div>
<div class="flex flex-wrap gap-2" id="regionFilters">
<button class="region-btn active px-3 py-1.5 rounded-lg bg-white/5 text-sm transition-all hover:bg-white/10" data-region="" id="regAll">全部</button>
</div>
<div class="flex-1"></div>
<div class="flex items-center gap-3">
<span class="text-gray-400 text-sm"><i class="fas fa-sort mr-1"></i><span id="sortLabel">排序:</span></span>
<select id="sortSelect" class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm focus:outline-none cursor-pointer">
<option value="rating">评分最高 ⭐</option>
<option value="name">名称排序 🔤</option>
<option value="category">分类排序 📂</option>
</select>
</div>
</div>

<div id="loadingState" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-4">
<div class="skeleton h-56 rounded-2xl"></div><div class="skeleton h-56 rounded-2xl"></div>
<div class="skeleton h-56 rounded-2xl"></div><div class="skeleton h-56 rounded-2xl"></div>
</div>
<div id="platformsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-4 hidden"></div>
<div id="emptyState" class="hidden text-center py-20">
<div class="text-7xl mb-6 float-animation">🔍</div>
<h3 class="text-2xl font-bold mb-3" id="emptyTitle">没有找到匹配的平台</h3>
<p class="text-gray-400 mb-6" id="emptyDesc">换个关键词试试，或者清除筛选条件</p>
<button onclick="clearFilters()" class="px-6 py-3 bg-gradient-to-r from-cyan-500 to-emerald-500 rounded-xl font-bold hover:opacity-90 transition"><i class="fas fa-redo mr-2"></i><span id="emptyBtn">清除筛选</span></button>
</div>
</main>

<div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-50 hidden items-center justify-center p-4">
<div class="glass rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-y-auto modal-enter">
<div class="p-6">
<div class="flex items-start justify-between mb-6">
<div class="flex items-center gap-4">
<div id="modalLogo" class="logo-container text-3xl">🎮</div>
<div><h2 id="modalName" class="text-2xl font-bold"></h2><p id="modalNameCn" class="text-gray-400"></p></div>
</div>
<button onclick="closeModal()" class="p-2 hover:bg-white/10 rounded-xl transition"><i class="fas fa-times text-xl"></i></button>
</div>
<div id="modalRating" class="flex items-center gap-2 mb-4"><span class="rating-star text-xl"><i class="fas fa-star"></i></span><span class="text-2xl font-bold"></span><span class="text-gray-400 text-sm">/ 10</span></div>
<div id="modalTags" class="flex flex-wrap gap-2 mb-5"></div>
<p id="modalDesc" class="text-gray-300 mb-5 leading-relaxed text-lg"></p>
<div class="grid grid-cols-2 gap-4 mb-5">
<div class="bg-gradient-to-br from-cyan-500/10 to-transparent rounded-2xl p-4 border border-cyan-500/20">
<div class="text-gray-400 text-xs mb-1 uppercase tracking-wider"><i class="fas fa-gamepad mr-1"></i><span id="modalGameCountLabel">游戏数量</span></div>
<div id="modalGameCount" class="font-bold text-lg text-cyan-400"></div>
</div>
<div class="bg-gradient-to-br from-emerald-500/10 to-transparent rounded-2xl p-4 border border-emerald-500/20">
<div class="text-gray-400 text-xs mb-1 uppercase tracking-wider"><i class="fas fa-globe mr-1"></i><span id="modalRegionLabel">覆盖地区</span></div>
<div id="modalRegion" class="font-bold text-lg text-emerald-400"></div>
</div>
</div>
<div id="modalHighlights" class="mb-6">
<div class="text-gray-400 text-xs mb-3 uppercase tracking-wider"><i class="fas fa-star mr-1"></i><span id="modalHighlightsLabel">平台亮点</span></div>
<div class="flex flex-wrap gap-2"></div>
</div>
<a id="modalUrl" href="#" target="_blank" class="flex items-center justify-center gap-2 w-full bg-gradient-to-r from-cyan-500 to-emerald-500 text-black py-4 rounded-2xl font-bold text-lg hover:opacity-90 transition pulse-glow"><i class="fas fa-external-link-alt"></i><span id="modalVisitBtn">访问官网</span></a>
</div>
</div>
</div>

<footer class="text-center py-10 text-gray-500 text-sm border-t border-white/5">
<div class="max-w-[1800px] mx-auto px-4">
<p class="mb-2">GameNav · <span id="footerTitle">游戏平台导航</span> · <span id="footerYear"></span></p>
<p class="text-xs" id="footerDesc">收录全球优质游戏平台，助力玩家发现好游戏</p>
</div>
</footer>

document.addEventListener('DOMContentLoaded',()=>{document.getElementById('footerYear').textContent=new Date().getFullYear();loadData();setupEventListeners();setLanguage(currentLang);});
function setupEventListeners(){document.getElementById('searchInput').addEventListener('input',debounce(e=>{searchQuery=e.target.value.toLowerCase();renderPlatforms();},250));document.getElementById('sortSelect').addEventListener('change',renderPlatforms);document.querySelectorAll('.lang-option').forEach(opt=>{opt.addEventListener('click',()=>setLanguage(opt.dataset.lang));});}
async function loadData(){try{const response=await fetch('data/platforms.json');if(!response.ok)throw new Error('Failed to load');platforms=await response.json();extractFilters();renderFilters();renderPlatforms();updateStats();}catch(error){document.getElementById('loadingState').innerHTML='<div class="col-span-full text-center py-20"><div class="text-7xl mb-6">😢</div><h3 class="text-2xl font-bold mb-3">加载失败</h3><p class="text-gray-400">请刷新页面重试</p></div>';}}
function extractFilters(){platforms.forEach(p=>{(p.category||[]).forEach(c=>categories.add(c));(p.region||[]).forEach(r=>regions.add(r));});}
function renderFilters(){const catContainer=document.getElementById('categoryFilters'),regContainer=document.getElementById('regionFilters');const sortedCats=Array.from(categories).sort();catContainer.innerHTML=`<button class="category-btn ${!currentCategory?'active':''} px-5 py-2 rounded-xl bg-white/5 text-sm font-medium transition-all whitespace-nowrap" data-category="">${t('catAll')}</button>`;sortedCats.forEach(cat=>{catContainer.innerHTML+=`<button class="category-btn ${currentCategory===cat?'active':''} px-5 py-2 rounded-xl bg-white/5 text-sm font-medium transition-all whitespace-nowrap" data-category="${cat}">${t(cat)}</button>`;});catContainer.querySelectorAll('.category-btn').forEach(btn=>{btn.addEventListener('click',()=>{currentCategory=btn.dataset.category;renderFilters();renderPlatforms();});});const sortedRegs=Array.from(regions).sort();regContainer.innerHTML=`<button class="region-btn ${!currentRegion?'active':''} px-3 py-1.5 rounded-lg bg-white/5 text-sm transition-all" data-region="">${t('regAll')}</button>`;sortedRegs.forEach(reg=>{regContainer.innerHTML+=`<button class="region-btn ${currentRegion===reg?'active':''} px-3 py-1.5 rounded-lg bg-white/5 text-sm transition-all" data-region="${reg}">${t(reg)}</button>`;});regContainer.querySelectorAll('.region-btn').forEach(btn=>{btn.addEventListener('click',()=>{currentRegion=btn.dataset.region;renderFilters();renderPlatforms();});});}
function getLogoEmoji(name){const nameLower=name.toLowerCase();if(nameLower.includes('steam'))return'🎮';if(nameLower.includes('epic'))return'🛒';if(nameLower.includes('gog'))return'👴';if(nameLower.includes('wegame')||nameLower.includes('腾讯'))return'🐧';if(nameLower.includes('battle')||nameLower.includes('blizzard')||nameLower.includes('暴雪'))return'🐺';if(nameLower.includes('ea'))return'🎯';if(nameLower.includes('taptap'))return'📱';if(nameLower.includes('4399'))return'🎲';if(nameLower.includes('nga'))return'📺';if(nameLower.includes('discord'))return'💬';if(nameLower.includes('twitch'))return'📺';if(nameLower.includes('bilibili')||nameLower.includes('b站'))return'🔴';if(nameLower.includes('斗鱼'))return'🐟';if(nameLower.includes('虎牙'))return'🐯';if(nameLower.includes('steamdb'))return'📊';if(nameLower.includes('模拟器'))return'🎴';if(nameLower.includes('switch'))return'🎮';if(nameLower.includes('xbox'))return'🎮';if(nameLower.includes('nintendo'))return'🎴';if(nameLower.includes('加速器'))return'🚀';if(nameLower.includes('折扣')||nameLower.includes('bundle'))return'💰';if(nameLower.includes('交易')||nameLower.includes('market'))return'🔄';return'🎮';}
function renderPlatforms(){const grid=document.getElementById('platformsGrid'),loading=document.getElementById('loadingState'),empty=document.getElementById('emptyState');let filtered=platforms.filter(p=>{if(currentCategory&&!(p.category||[]).includes(currentCategory))return false;if(currentRegion&&!(p.region||[]).includes(currentRegion))return false;if(searchQuery){const searchable=[p.name,p.name_cn,p.description,...(p.tags||[])].join(' ').toLowerCase();if(!searchable.includes(searchQuery))return false;}return true;});const sortBy=document.getElementById('sortSelect').value;if(sortBy==='rating')filtered.sort((a,b)=>(b.rating||0)-(a.rating||0));else if(sortBy==='name')filtered.sort((a,b)=>(a.name_cn||a.name).localeCompare(b.name_cn||b.name));else filtered.sort((a,b)=>(a.category||[]).join().localeCompare((b.category||[]).join()));loading.classList.add('hidden');if(filtered.length===0){grid.classList.add('hidden');empty.classList.remove('hidden');return;}empty.classList.add('hidden');grid.classList.remove('hidden');grid.innerHTML=filtered.map(p=>`<div class="glass rounded-2xl p-5 card-hover cursor-pointer glass-hover" onclick="showModal('${p.id}')"><div class="flex items-start gap-4 mb-4"><div class="logo-container flex-shrink-0">${p.logo?`<img src="${p.logo}" alt="${p.name}" onerror="this.parentElement.innerHTML='${getLogoEmoji(p.name)}'" loading="lazy">`:getLogoEmoji(p.name)}</div><div class="flex-1 min-w-0"><h3 class="font-bold text-lg truncate">${p.name_cn||p.name}</h3><p class="text-gray-400 text-sm truncate">${p.name}</p></div><div class="flex items-center gap-1 rating-star text-sm"><i class="fas fa-star"></i><span class="font-bold">${(p.rating||0).toFixed(1)}</span></div></div><p class="text-gray-400 text-sm line-clamp-2 mb-4 leading-relaxed">${p.description||''}</p><div class="flex items-center justify-between"><div class="flex flex-wrap gap-1">${(p.tags||[]).slice(0,2).map(tag=>`<span class="tag-pill px-2 py-0.5 rounded-lg text-xs">${t(tag)}</span>`).join('')}</div></div></div>`).join('');}
function showModal(id){const p=platforms.find(x=>x.id===id);if(!p)return;const logoContainer=document.getElementById('modalLogo');logoContainer.innerHTML=p.logo?`<img src="${p.logo}" alt="${p.name}" onerror="this.innerHTML='${getLogoEmoji(p.name)}'" loading="lazy">`:getLogoEmoji(p.name);document.getElementById('modalName').textContent=p.name;document.getElementById('modalNameCn').textContent=p.name_cn||'';document.getElementById('modalRating').querySelector('span.text-2xl').textContent=`${(p.rating||0).toFixed(1)}`;document.getElementById('modalDesc').textContent=p.description||'';document.getElementById('modalGameCount').textContent=p.game_count||'未知';document.getElementById('modalRegion').textContent=(p.region||[]).map(r=>t(r)).join(', ')||'全球';const url=document.getElementById('modalUrl');url.href=p.url;url.target='_blank';document.getElementById('modalTags').innerHTML=(p.category||[]).map(c=>`<span class="tag-pill px-3 py-1 rounded-xl text-sm">${t(c)}</span>`).join('');document.getElementById('modalHighlights').querySelector('div:last-child').innerHTML=(p.highlights||[]).map(h=>`<span class="highlight-pill px-3 py-1 rounded-xl text-sm">${h}</span>`).join('');document.getElementById('modal').classList.remove('hidden');document.getElementById('modal').classList.add('flex');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('modal').classList.add('hidden');document.getElementById('modal').classList.remove('flex');document.body.style.overflow='';}
function clearFilters(){currentCategory='';currentRegion='';searchQuery='';document.getElementById('searchInput').value='';renderFilters();renderPlatforms();}
function updateStats(){const count=platforms.length;document.getElementById('statsCount').textContent=`共 ${count} 个平台`;document.getElementById('heroCount').textContent=count;}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
</body>
</html>
